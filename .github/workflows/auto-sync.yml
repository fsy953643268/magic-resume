name: Auto Sync Fork

on:
  schedule:
    # 每天 UTC 时间 2:00 自动同步（北京时间 10:00）
    - cron: '0 2 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Sync from upstream
        run: |
          # 添加原版仓库为 upstream
          git remote add upstream https://github.com/JOYCEQL/magic-resume.git
          git fetch upstream
          
          # 尝试自动合并原版的 main 分支到你的 main
          git checkout main
          git merge upstream/main --no-edit
          
      - name: Push back to your fork
        run: |
          git push origin main
