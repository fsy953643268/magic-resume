name: Auto Sync Fork

on:
  schedule:
    # 每天 UTC 时间 2:00 自动同步（北京时间 10:00）
    - cron: '0 2 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/JOYCEQL/magic-resume.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "No changes to merge or conflict"
          
      - name: Push back to your fork
        run: |
          git push origin main